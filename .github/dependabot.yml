version: 2
updates:
  # Rust / Cargo dependencies
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  # Frontend / npm dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
